<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover United States</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#f0f2f5;

}
.hero{
    background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45));
    background-image: url("unitedstates.jpg");
    background-size:cover;
    height:60vh;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:44px;
    font-weight:bold;
}
.grid{display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:30px 60px;}
.card{background:white;
    border-radius:16px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.1);}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;
    height:180px;
    object-fit:cover;}
.content{padding:15px;}
.btn{background:black;
    color:white;
    padding:8px 16px;
    border-radius:20px;
    text-decoration:none;}
.price{font-weight:bold;
margin:6px 0;}
</style>
</head>
<body>
<div class="hero">Explore United States</div>


<div class="grid">
<div class="card"><img src="ny.png"><div class="content"><h3>New York</h3><p>Times Square & Statue of Liberty.</p><div class="price">$870</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="lasvegas.jpg"><div class="content"><h3>Las Vegas</h3><p>Entertainment capital of world.</p><div class="price">$760</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="grandcanyon.jpg"><div class="content"><h3>Grand Canyon</h3><p>Natural wonder adventure.</p><div class="price">$690</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="sanfrancisco.jpg"><div class="content"><h3>San Francisco</h3><p>Golden Gate & bay culture.</p><div class="price">$710</div><a class="btn">Book Now</a></div></div>
</div>
</body>
</html>
