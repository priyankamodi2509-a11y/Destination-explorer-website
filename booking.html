<!DOCTYPE html>
<html>
<head>
  <title>Flight Booking</title>

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      background-image: url('bookingimg.jpg');
      margin: 0;
    }

    .navbar {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .box {
      background: white;
      width: 400px;
      margin: 60px auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff5a5f, #ff9966);
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.05);
    }

    .swap {
      background: #555;
    }

    .summary {
      margin-top: 15px;
      padding: 10px;
      background: #e8f5e9;
      border-radius: 10px;
    }

    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="navbar">✈ </div>

<div class="box">

  <select id="from" onchange="validateLocations()">
    <option value="">From</option>
    <option>Delhi</option>
    <option>Goa</option>
    <option>Mumbai</option>
    <option>Pune</option>
    <option>Indore</option>
    <option>Chennai</option>
    <option>Chandigarh</option>
  </select>

  <select id="to" onchange="validateLocations()">
    <option value="">To</option>
    <option>Delhi</option>
    <option>Goa</option>
    <option>Mumbai</option>
    <option>Pune</option>
    <option>Indore</option>
    <option>Chennai</option>
    <option>Chandigarh</option>
  </select>

  <button class="swap" onclick="swapLocations()">🔄 Swap</button>

  <input id="date" type="date">

  <button onclick="bookFlight()">Search Flights</button>

  <p id="msg" class="error"></p>

  <div id="summary"></div>

</div>

<script>
let today = new Date().toISOString().split("T")[0];
document.getElementById("date").min = today;

function validateLocations() {
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let msg = document.getElementById("msg");

  if (from !== "" && to !== "" && from === to) {
    msg.innerText = "From and To cannot be same!";
  } else {
    msg.innerText = "";
  }
}

function swapLocations() {
  let from = document.getElementById("from");
  let to = document.getElementById("to");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;
}

function bookFlight() {
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;
  let date = document.getElementById("date").value;
  let msg = document.getElementById("msg");
  let summary = document.getElementById("summary");

  if (from === "" || to === "" || date === "") {
    msg.innerText = "All fields required!";
    return;
  }

  if (from === to) {
    msg.innerText = "From and To cannot be same!";
    return;
  }

  if (date < today) {
    msg.innerText = "Past date not allowed!";
    return;
  }

  msg.innerText = "";

  let booking = { from, to, date };
  localStorage.setItem("bookingData", JSON.stringify(booking));

  summary.innerHTML = `
    <div class="summary">
      <h3>Booking Confirmed</h3>
      <p><b>From:</b> ${from}</p>
      <p><b>To:</b> ${to}</p>
      <p><b>Date:</b> ${date}</p>
    </div>
  `;
}

window.onload = function () {
  let data = JSON.parse(localStorage.getItem("bookingData"));
  if (data) {
    document.getElementById("summary").innerHTML = `
      <div class="summary">
        <h3>Last Booking</h3>
        <p>${data.from} → ${data.to} (${data.date})</p>
      </div>
    `;
  }
};
</script>

</body>
</html>
