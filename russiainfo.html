<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Russia</title>
<style>
body{margin:0;
    font-family:'Segoe UI';
    background:#f0f2f5;}
.hero{background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url("russiacity.jpg");
background-size:cover;
height:60vh;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:44px;
font-weight:bold;}
.grid{display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:30px 60px;}
.card{background:white;
    border-radius:16px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.1);}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;
    height:180px;
    object-fit:cover;}
.content{padding:15px;}
.btn{background:black;
    color:white;
    padding:8px 16px;
    border-radius:20px;
    text-decoration:none;}
.price{font-weight:bold;
margin:6px 0;}
</style>
</head>
<body>
<div class="hero">Discover Russia</div>


<div class="grid">
<div class="card"><img src="moscow.jpg"><div class="content"><h3>Moscow</h3><p>Red Square and iconic Kremlin heritage.</p><div class="price">$900</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="st.petersburg.jpg"><div class="content"><h3>St Petersburg</h3><p>Canals, palaces and royal history.</p><div class="price">$850</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="siberia.jpg"><div class="content"><h3>Siberia</h3><p>Snow landscapes and Baikal lake.</p><div class="price">$780</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="kazan.jpg"><div class="content"><h3>Kazan</h3><p>Russian–Tatar culture blend.</p><div class="price">$720</div><a class="btn">Book Now</a></div></div>
</div>
</body>
</html>
