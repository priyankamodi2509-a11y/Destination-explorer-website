<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Spain</title>
<style>
body{margin:0;
    font-family:'Segoe UI';
    background:#f0f2f5;}
.hero{
    background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45));
    background-image: url(spaincity.jpg);
    background-size:cover;
    height:60vh;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:44px;
    font-weight:bold;}
.grid{display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:30px 60px;}
.card{background:white;
    border-radius:16px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.1);}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;
    height:180px;
    object-fit:cover;}
.content{padding:15px;}
.btn{background:black;
    color:white;
    padding:8px 16px;
    border-radius:20px;
    text-decoration:none;}
.price{font-weight:bold;
margin:6px 0;}
</style>
</head>
<body>
<div class="hero">Exploring Spain</div>


<div class="grid">
<div class="card"><img src="barcelona.png"><div class="content"><h3>Barcelona</h3><p>Gaudi architecture and beaches.</p><div class="price">$600</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="madrid.jpg"><div class="content"><h3>Madrid</h3><p>Royal palace and vibrant life.</p><div class="price">$620</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="seville.jpg"><div class="content"><h3>Seville</h3><p>Flamenco and traditions.</p><div class="price">$580</div><a class="btn">Book Now</a></div></div>


<div class="card"><img src="valencia.jpg"><div class="content"><h3>Valencia</h3><p>City of arts & Mediterranean coast.</p><div class="price">$610</div><a class="btn">Book Now</a></div></div>
</div>
</body>
</html>
